<section class="contact">

<h2>Contact Me</h2>

<p>

Feel free to contact me for internships, freelance work or collaboration.

</p>

<form action="#" method="post" aria-label="Contact Form">

<div class="form-group">

<label for="name">

Full Name

</label>

<input

type="text"

id="name"

name="name"

placeholder="Enter your name"

required

autocomplete="name"

>

</div>

<div class="form-group">

<label for="email">

Email Address

</label>

<input

type="email"

id="email"

name="email"

placeholder="Enter your email"

required

autocomplete="email"

>

</div>

<div class="form-group">

<label for="phone">

Phone Number

</label>

<input

type="tel"

id="phone"

name="phone"

placeholder="9876543210"

autocomplete="tel"

>

</div>

<div class="form-group">

<label for="subject">

Subject

</label>

<input

type="text"

id="subject"

name="subject"

placeholder="Enter subject"

required

>

</div>

<div class="form-group">

<label for="message">

Message

</label>

<textarea

id="message"

name="message"

rows="6"

placeholder="Write your message..."

required

></textarea>

</div>

<button type="submit" class="btn">

Send Message

</button>

</form>

</section>
