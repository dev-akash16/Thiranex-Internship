<section>

<h2>Contact Form</h2>

<form action="#" method="post" aria-label="Contact Form">

<label for="name">Full Name</label>

<input
type="text"
id="name"
name="name"
required
autocomplete="name">

<label for="email">Email</label>

<input
type="email"
id="email"
name="email"
required
autocomplete="email">

<label for="message">Message</label>

<textarea
id="message"
name="message"
rows="6"
required></textarea>

<button type="submit">

Send Message

</button>

</form>

<footer>

<p>Thanks for visiting!</p>
